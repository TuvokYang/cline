name: "Publish Release To Github"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v3.1.2)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write

jobs:
  test:
    uses: ./.github/workflows/ext-vscode-test.yml

  publish:
    needs: test
    name: Publish Extension
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          lfs: true

      - name: Resolve Release Tag
        id: resolve_tag
        env:
          TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
        run: |
          if [[ -z "$TAG" ]]; then
            echo "Error: tag is required"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Error: tag must match vX.Y.Z (optionally with -suffix or .suffix)"
            exit 1
          fi

          git fetch origin --tags
          git fetch origin main dev
          TAG_REF="refs/tags/$TAG"
          if ! git show-ref --verify --quiet "$TAG_REF"; then
            echo "Error: tag $TAG does not exist in the repository"
            exit 1
          fi

          # Switch to tag commit
          git checkout --detach "$TAG_REF^{commit}"
          TAG_SHA=$(git rev-parse HEAD)

          # Detect which branch contains this tag commit
          # Priority: main > dev. If on both main+dev, treat as main (published).
          IS_MAIN=false
          IS_DEV=false
          if git branch -r --contains "$TAG_SHA" origin/main &>/dev/null; then
            IS_MAIN=true
          fi
          if git branch -r --contains "$TAG_SHA" origin/dev &>/dev/null; then
            IS_DEV=true
          fi

          # Validate: must be on main or dev
          if [[ "$IS_MAIN" == "false" && "$IS_DEV" == "false" ]]; then
            echo "Error: tag $TAG commit is not on main or dev branch"
            exit 1
          fi

          # Set outputs
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "resolved_sha=$TAG_SHA" >> $GITHUB_OUTPUT
          echo "is_main=$IS_MAIN" >> $GITHUB_OUTPUT
          echo "is_dev=$IS_DEV" >> $GITHUB_OUTPUT

          # Determine draft, prerelease, and release_type:
          #   main  → published (full release)
          #   dev   → draft only
          if [[ "$IS_MAIN" == "true" ]]; then
            echo "release_draft=false" >> $GITHUB_OUTPUT
            echo "release_type=release" >> $GITHUB_OUTPUT
            # prerelease if tag has suffix (e.g. v3.1.2-beta, v3.1.2-rc.1)
            if [[ "$TAG" =~ -[0-9A-Za-z.]+$ ]]; then
              echo "release_prerelease=true" >> $GITHUB_OUTPUT
              echo "release_type=pre-release" >> $GITHUB_OUTPUT
              echo "Branch: main (pre-release)"
            else
              echo "release_prerelease=false" >> $GITHUB_OUTPUT
              echo "Branch: main (full release)"
            fi
          else
            echo "release_draft=true" >> $GITHUB_OUTPUT
            echo "release_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_type=draft" >> $GITHUB_OUTPUT
            echo "Branch: dev (draft release)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bun
        run: npm install -g bun

      - name: Install root dependencies
        run: |
          bun install
          npm install --package-lock-only --ignore-scripts

      - name: Install webview-ui dependencies
        run: cd webview-ui && bun install

      - name: Install Publishing Tools
        run: npm install -g @vscode/vsce ovsx

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Tag Matches Package Version
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          VERSION="v${{ steps.get_version.outputs.version }}"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Error: tag '$TAG' does not match package version '$VERSION'"
            exit 1
          fi
          echo "Tag and package version match: $TAG"

      - name: Verify LFS media assets are resolved
        run: |
          for FILE in webview-ui/src/assets/cline_kanban_demo.mp4 webview-ui/src/assets/cline_kanban_demo.webm; do
            if grep -q "git-lfs.github.com/spec/v1" "$FILE"; then
              echo "Error: $FILE is still a Git LFS pointer in CI checkout"
              exit 1
            fi
          done

      - name: Build Package
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          CLINE_ENVIRONMENT: production
          RELEASE_TYPE: ${{ steps.resolve_tag.outputs.release_type }}
          TELEMETRY_SERVICE_API_KEY: ${{ secrets.TELEMETRY_SERVICE_API_KEY }}
          ERROR_SERVICE_API_KEY: ${{ secrets.ERROR_SERVICE_API_KEY }}
          OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
          OTEL_LOGS_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        run: |
          # Required to generate the .vsix
          vsce package --allow-package-secrets sendgrid --out "cline-${{ steps.get_version.outputs.version }}.vsix"

      - name: Get Previous Tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ steps.resolve_tag.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG^" 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Get Changelog Entry
        id: changelog
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          VERSION_NUM="${TAG#v}"
          ESCAPED_VER=$(echo "$VERSION_NUM" | sed 's/\./\\./g')
          CONTENT=$(awk -v ver="$ESCAPED_VER" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [[ -z "$CONTENT" ]]; then
            echo "Error: no changelog entry found for version $VERSION_NUM"
            exit 1
          fi
          DELIM="EOF_${RANDOM}"
          echo "content<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: "*.vsix"
          draft: ${{ steps.resolve_tag.outputs.release_draft == 'true' }}
          prerelease: ${{ steps.resolve_tag.outputs.release_prerelease == 'true' }}
          body: |
            ${{ steps.changelog.outputs.content }}
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.prev_tag }}...${{ steps.resolve_tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}